---
layout: default
---
<article class="project-detail">
  <h1>{{ page.title }}</h1>
  <p class="project-meta">{{ page.date | date: '%B %Y' }}{% if page.tags %} · {{ page.tags | join: ', ' }}{% endif %}</p>

  {% if page.thumbnail %}
  <img class="project-hero" src="{{ page.thumbnail | relative_url }}" alt="{{ page.title }}">
  {% endif %}

  <div class="project-body">
    {{ content }}
  </div>

  {% if page.link %}
  <p><a class="project-link" href="{{ page.link }}" target="_blank" rel="noopener">View project →</a></p>
  {% endif %}

  <p><a href="{{ '/' | relative_url }}">← Back to all projects</a></p>
</article>
